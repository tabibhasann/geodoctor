- id: geodoctor-check
  name: geodoctor
  description: Lint geospatial vector datasets (GeoPackage, GeoJSON, FlatGeobuf, Shapefile, GeoParquet).
  entry: geodoctor check --ci
  language: python
  language_version: python3
  types: [file]
  files: \.(gpkg|geojson|json|fgb|shp|parquet|geoparquet)$
  pass_filenames: true
  require_serial: false
  additional_dependencies: ["geodoctor"]
