# pre-commit hook for geodoctor
# Add this to your .pre-commit-config.yaml
repos:
  - repo: https://github.com/tabibhasan/geodoctor
    rev: v0.2.0
    hooks:
      - id: geodoctor
        name: geodoctor — geospatial data linter
        entry: geodoctor check
        language: python
        files: \.(shp|geojson|gpkg|kml|csv)$
        pass_filenames: true
